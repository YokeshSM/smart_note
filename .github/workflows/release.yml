name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build frontend and create GitHub Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Update version in docs
        working-directory: .
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Using version ${VERSION}"

          # Update version in DOCKER_COMMANDS.txt
          sed -i "s/^VERSION=\".*\"$/VERSION=\"${VERSION}\"/" DOCKER_COMMANDS.txt

          # Update version in README.md
          sed -i "s/Current Docker image tag: \`.*\`/Current Docker image tag: \`${VERSION}\`/" README.md

      - name: Commit and push version bump
        if: ${{ github.ref_type == 'tag' }}
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md DOCKER_COMMANDS.txt
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
            git push origin HEAD:master
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-notes-frontend
          path: frontend/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

