name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build frontend and create GitHub Release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Bump version in README and DOCKER_COMMANDS
        working-directory: ..
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Bumping to ${VERSION}"
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]*/${VERSION}/" README.md
          sed -i "s/^VERSION=\"v[0-9]*\.[0-9]*\.[0-9]*\"$/VERSION=\"${VERSION}\"/" DOCKER_COMMANDS.txt

      - name: Derive change type from commit message
        working-directory: ..
        run: |
          MSG="$(git log -1 --pretty=%B "${GITHUB_REF}")"
          echo "Last commit message:"
          echo "${MSG}"

          TYPE="Update"
          if echo "${MSG}" | grep -iE '^(feat|feature):'; then
            TYPE="Feature"
          elif echo "${MSG}" | grep -iE '^(fix|bugfix|bug):'; then
            TYPE="Bug fix"
          elif echo "${MSG}" | grep -iE '^(chore|refactor):'; then
            TYPE="Refactor"
          fi

          echo "CHANGE_TYPE=${TYPE}" >> "${GITHUB_ENV}"
          {
            echo 'LAST_COMMIT_MSG<<EOF'
            echo "${MSG}"
            echo 'EOF'
          } >> "${GITHUB_ENV}"

      - name: Commit and push version bump
        working-directory: ..
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md DOCKER_COMMANDS.txt
          if git diff --staged --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: bump version to ${GITHUB_REF_NAME}"
            git push origin HEAD:master || git push origin HEAD:main
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-notes-frontend
          path: frontend/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }} - ${{ env.CHANGE_TYPE }}"
          body: |
            ## Type
            ${{ env.CHANGE_TYPE }}

            ## Summary
            ${{ env.LAST_COMMIT_MSG }}

          files: |
            frontend/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

